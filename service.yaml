apiVersion: v1
kind: Service
metadata:
  name: cowrie-service
  namespace: honeypot
spec:
  type: NodePort
  selector:
    app: cowrie
  ports:
    - name: ssh
      protocol: TCP
      port: 2222
      targetPort: 2222
      nodePort: 30222
    - name: api
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30500
